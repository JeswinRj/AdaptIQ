{% extends "base.html" %}
{% block title %}{{ heading }} — Adapt IQ{% endblock %}
{% block content %}
<section class="narrow">
  <p class="wordmark">Adapt IQ</p>
  <h1 class="display-sm">{{ heading }}</h1>
  <p class="lede">{{ detail }}</p>

  </div>
</section>
{% endblock %}
